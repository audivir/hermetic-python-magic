name: Release on GitHub and Publish to PyPI
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  packages: write
jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} for Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14] # , windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool patchelf
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool
      - name: Setup MSYS2 and MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc mingw-w64-x86_64-autotools mingw-w64-x86_64-libsystre
          path-type: inherit
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: pdm build -v --no-sdist
      - name: Build wheel (Linux/macOS)
        if: runner.os != 'Windows'
        run: pdm build -v --no-sdist
      - name: Repair Linux wheels for PyPI (manylinux)
        if: runner.os == 'Linux'
        run: |
          pip install auditwheel
          for whl in dist/*.whl; do
            auditwheel repair "$whl" -w dist_repaired/
          done
          rm -rf dist/
          mv dist_repaired/ dist/
      - name: Repair macOS wheels (delocate)
        if: runner.os == 'macOS'
        run: |
          pip install delocate
          for whl in dist/*.whl; do
            delocate-wheel -w dist_repaired/ -v "$whl"
          done
          rm -rf dist/
          mv dist_repaired/ dist/
      - name: Repair Windows wheels (delvewheel)
        if: runner.os == 'Windows'
        run: |
          pip install delvewheel
          # delvewheel bundles the MSYS2/MinGW DLLs (like gnurx) directly into the wheel
          for whl in dist/*.whl; do
            delvewheel repair -w dist_repaired/ -v "$whl"
          done
          rm -rf dist/
          mv dist_repaired/ dist/
      - name: Upload Wheel Artifacts
        uses: actions/upload-artifact@v7
        with:
          # Use both OS and Python version in the artifact name to avoid overwriting
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
  build-sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12" # SDist is universal, so we just need one Python version
      - name: Install PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
      - name: Build sdist
        run: pdm build -v --no-wheel
      - name: Upload sdist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
  release-and-publish:
    name: Release to GitHub and Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
